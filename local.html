<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brasil</title>

    <link rel="stylesheet" href="styles/local.css">
    <link rel="stylesheet" href="styles/local-large.css">

    <script src="scripts/local.js" defer></script>
</head>

<body>

    <header>
        <h1>Brasil</h1>
    </header>

    <main>

        <picture>

            <source media="(min-width:800px)" srcset="imagens/brasil-large.webp">

            <img src="imagens/brasil-small.webp" alt="Paisagem do Brasil">

        </picture>

        <section class="data">

            <h2>Dados</h2>

            <p><strong>Capital:</strong> Brasília</p>
            <p><strong>População:</strong> 203 milhões</p>
            <p><strong>Idioma:</strong> Português</p>
            <p><strong>Moeda:</strong> Real</p>
            <p><strong>Área:</strong> 8.516.000 km²</p>

        </section>

        <section class="weather">

            <h2>Clima</h2>

            <img src="imagens/weather.svg" alt="Ícone do clima">

            <p><strong>Temperatura:</strong> <span id="temp">8</span>°C</p>

            <p><strong>Vento:</strong> <span id="wind">6</span> km/h</p>

            <p><strong>Sensação:</strong> <span id="windchill"></span></p>

        </section>

    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Naiara Cassimiro | Brasil</p>

        <p>
            Última modificação:
            <span id="lastModified"></span>
        </p>
    </footer>


</body>

</html>
