<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Brasil | WDD 131 - Página do País</title>

    <meta name="description" content="Conheça o Brasil, seus dados geográficos e informações sobre o clima.">

    <meta name="author" content="Naiara Cassimiro">

    <link rel="stylesheet" href="estilos/local.css">
    <link rel="stylesheet" href="estilos/local-large.css">

    <script src="scripts/local.js" defer></script>
</head>

<body>

    <header>
        <h1>Brasil</h1>
    </header>

    <main>

        <!-- HERO IMAGE -->

        <section class="hero">

            <picture>

                <source media="(min-width: 800px)" srcset="imagens/brasil-large.webp">

                <img src="imagens/brasil-small.png" alt="Vista panorâmica do Rio de Janeiro com o Pão de Açúcar">

            </picture>

        </section>

        <!-- CONTEÚDO -->

        <section class="cards">

            <!-- DADOS -->

            <section class="card data">

                <h2 class="section-title">
                    Dados
                </h2>

                <p><strong>Capital:</strong> Brasília</p>

                <p><strong>População:</strong> 203 Milhões</p>

                <p><strong>Área:</strong> 8.516.000 km²</p>

                <p><strong>Idioma:</strong> Português</p>

                <p><strong>Moeda:</strong> Real (BRL)</p>

                <p><strong>Fuso Horário:</strong> UTC−3</p>

            </section>

            <!-- CLIMA -->

            <section class="card weather">

                <h2 class="section-title climate-title">
                    Clima
                </h2>

                <!-- SVG somente no mobile -->

                <img class="weather-icon" src="imagens/weather.svg"
                    alt="Ícone representando clima parcialmente nublado">

                <p>

                    <strong>Temperatura:</strong>

                    <span id="temp">8</span> °C

                </p>

                <p>

                    <strong>Velocidade do Vento:</strong>

                    <span id="wind">6</span> km/h

                </p>

                <p>

                    <strong>Condição:</strong>

                    <span id="condition">
                        Parcialmente Nublado
                    </span>

                </p>

                <p>

                    <strong>Sensação térmica:</strong>

                    <span id="windchill"></span>

                </p>

            </section>

        </section>

    </main>

    <footer>

        <p>

            &copy;

            <span id="year"></span>

            Naiara Cassimiro | Brasil

        </p>

        <p>

            Última modificação:

            <span id="lastModified"></span>

        </p>

    </footer>

</body>

</html>
