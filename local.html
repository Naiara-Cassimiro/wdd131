<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coreia do Sul | WDD 131 - Página do País</title>

    <meta name="description"
        content="Conheça a Coreia do Sul, suas principais características, dados geográficos e informações sobre o clima.">
    <meta name="author" content="Naiara Cristina">

    <link rel="stylesheet" href="styles/local.css">

    <script src="scripts/local.js" defer></script>
</head>

<body>

    <header>
        <h1>Coreia do Sul</h1>
    </header>

    <main>

        <!-- Imagem Principal -->
        <section class="hero">

            <picture>

                <source media="(max-width: 768px)" srcset="images/korea-small.webp">

                <img src="images/korea-large.webp" alt="Vista da cidade de Seul, capital da Coreia do Sul"
                    loading="lazy">

            </picture>

        </section>

        <!-- Informações do País -->
        <section class="country-data">

            <h2>Dados</h2>

            <p><strong>Capital:</strong> Seul</p>

            <p><strong>População:</strong> Aproximadamente 51 milhões</p>

            <p><strong>Área:</strong> 100.210 km²</p>

            <p><strong>Idioma:</strong> Coreano</p>

            <p><strong>Moeda:</strong> Won Sul-Coreano (KRW)</p>

            <p><strong>Fuso horário:</strong> UTC +9</p>

        </section>

        <!-- Clima -->
        <section class="weather">

            <h2 class="weather-title">
                Clima

                <img class="weather-icon" src="images/weather.svg" alt="Ícone representando clima parcialmente nublado">
            </h2>

            <p><strong>Temperatura:</strong>
                <span id="temperature">8</span> °C
            </p>

            <p><strong>Velocidade do vento:</strong>
                <span id="wind">12</span> km/h
            </p>

            <p><strong>Sensação térmica:</strong>
                <span id="windchill"></span>
            </p>

        </section>

    </main>

    <footer>

        <p>
            &copy;
            <span id="currentyear"></span>
            Naiara Cristina | Brasil
        </p>

        <p>
            Última modificação:
            <span id="lastModified"></span>
        </p>

    </footer>

</body>

</html>
